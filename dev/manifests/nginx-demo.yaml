apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  namespace: octantis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-demo
  template:
    metadata:
      labels:
        app: nginx-demo
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-demo
  namespace: octantis
spec:
  selector:
    app: nginx-demo
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-demo
  namespace: octantis
spec:
  parentRefs:
    - name: octantis-gateway
      namespace: octantis
  hostnames:
    - "demo.octantis.cluster.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nginx-demo
          port: 80
