# Kubernetes MCP Server for Kind dev cluster
# Provides Kubernetes resource queries to enrich Octantis investigations.
# Image: https://github.com/containers/kubernetes-mcp-server
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-k8s
  namespace: monitoring
  labels:
    app: mcp-k8s

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-k8s-reader
  labels:
    app: mcp-k8s
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - events
      - configmaps
      - namespaces
      - nodes
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-k8s-reader
  labels:
    app: mcp-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-k8s-reader
subjects:
  - kind: ServiceAccount
    name: mcp-k8s
    namespace: monitoring

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-k8s
  namespace: monitoring
  labels:
    app: mcp-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-k8s
  template:
    metadata:
      labels:
        app: mcp-k8s
    spec:
      serviceAccountName: mcp-k8s
      containers:
        - name: mcp-k8s
          image: ghcr.io/containers/kubernetes-mcp-server:latest
          args:
            - --port
            - "8080"
            - --read-only
            - --log-level
            - "3"
          ports:
            - name: sse
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: sse
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: sse
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-k8s
  namespace: monitoring
  labels:
    app: mcp-k8s
spec:
  selector:
    app: mcp-k8s
  ports:
    - name: sse
      port: 8080
      targetPort: sse
      protocol: TCP
