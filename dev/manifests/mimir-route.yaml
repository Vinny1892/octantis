apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mimir
  namespace: mimir
spec:
  parentRefs:
    - name: octantis-gateway
      namespace: octantis
  hostnames:
    - "mimir.octantis.cluster.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mimir-gateway
          port: 80
