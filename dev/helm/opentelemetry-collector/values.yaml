mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false

# ServiceAccount + RBAC for prometheus receiver (scrape kube-state-metrics)
serviceAccount:
  create: true
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "nodes", "services", "endpoints"]
      verbs: ["get", "list", "watch"]

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

    # Scrape kube-state-metrics and forward to Octantis
    prometheus:
      config:
        scrape_configs:
          - job_name: kube-state-metrics
            scrape_interval: 30s
            static_configs:
              - targets:
                  - "prom-kube-state-metrics.monitoring.svc.cluster.local:8080"

  processors:
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    batch:
      send_batch_size: 1000
      timeout: 10s
    # Filter only metrics relevant to Octantis to avoid flooding it
    filter/octantis:
      metrics:
        include:
          match_type: regexp
          metric_names:
            - kube_pod_container_status_restarts_total
            - kube_pod_status_phase
            - kube_pod_container_status_waiting_reason
            - kube_pod_container_status_terminated_reason
            - kube_pod_container_status_last_terminated_reason
            - kube_node_status_condition
            - kube_deployment_status_replicas_unavailable
            - kube_pod_container_resource_requests
            - kube_pod_container_resource_limits
            - container_cpu_usage_seconds_total
            - container_memory_working_set_bytes

  exporters:
    prometheusremotewrite:
      endpoint: "http://mimir-gateway.mimir.svc.cluster.local/api/v1/push"
      headers:
        X-Scope-OrgID: "dev"
      tls:
        insecure: true
      resource_to_telemetry_conversion:
        enabled: true
    debug:
      verbosity: normal
    # Forward filtered metrics to Octantis via OTLP
    otlp/octantis:
      endpoint: "octantis.monitoring.svc.cluster.local:4317"
      tls:
        insecure: true

  service:
    pipelines:
      # Incoming OTLP → Mimir
      metrics/otlp:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheusremotewrite, debug]
      # kube-state-metrics → filter → Octantis
      metrics/k8s:
        receivers: [prometheus]
        processors: [memory_limiter, filter/octantis, batch]
        exporters: [otlp/octantis]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [debug]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [debug]
