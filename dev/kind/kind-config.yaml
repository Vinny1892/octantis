kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: octantis-dev

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"

  - role: worker
    extraMounts:
      - hostPath: /tmp/octantis-dev/worker1
        containerPath: /data
        readOnly: false

  - role: worker
    extraMounts:
      - hostPath: /tmp/octantis-dev/worker2
        containerPath: /data
        readOnly: false
