apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "octantis.fullname" . }}
  labels:
    {{- include "octantis.labels" . | nindent 4 }}
    app.kubernetes.io/component: octantis
data:
  OTLP_GRPC_PORT: {{ .Values.octantis.otlp.grpc.port | quote }}
  OTLP_HTTP_PORT: {{ .Values.octantis.otlp.http.port | quote }}
  OTLP_GRPC_ENABLED: {{ .Values.octantis.otlp.grpc.enabled | quote }}
  OTLP_HTTP_ENABLED: {{ .Values.octantis.otlp.http.enabled | quote }}
  OTLP_QUEUE_MAX_SIZE: {{ .Values.octantis.otlp.queueMaxSize | quote }}

  LLM_PROVIDER: {{ .Values.octantis.llm.provider | quote }}
  LLM_MODEL: {{ .Values.octantis.llm.model | quote }}
  LLM_MAX_TOKENS: {{ .Values.octantis.llm.maxTokens | quote }}
  LLM_TEMPERATURE: {{ .Values.octantis.llm.temperature | quote }}
  {{- if .Values.octantis.llm.investigationModel }}
  LLM_INVESTIGATION_MODEL: {{ .Values.octantis.llm.investigationModel | quote }}
  {{- end }}

  {{- $grafanaMcpUrl := include "octantis.grafanaMcpUrl" . }}
  {{- if $grafanaMcpUrl }}
  GRAFANA_MCP_URL: {{ $grafanaMcpUrl | quote }}
  {{- end }}

  {{- $k8sMcpUrl := include "octantis.k8sMcpUrl" . }}
  {{- if $k8sMcpUrl }}
  K8S_MCP_URL: {{ $k8sMcpUrl | quote }}
  {{- end }}

  INVESTIGATION_MAX_QUERIES: {{ .Values.octantis.investigation.maxQueries | quote }}
  INVESTIGATION_TIMEOUT_SECONDS: {{ .Values.octantis.investigation.timeoutSeconds | quote }}
  INVESTIGATION_QUERY_TIMEOUT_SECONDS: {{ .Values.octantis.investigation.queryTimeoutSeconds | quote }}

  METRICS_PORT: {{ .Values.octantis.metrics.port | quote }}
  METRICS_ENABLED: {{ .Values.octantis.metrics.enabled | quote }}

  PIPELINE_CPU_THRESHOLD: {{ .Values.octantis.pipeline.cpuThreshold | quote }}
  PIPELINE_MEMORY_THRESHOLD: {{ .Values.octantis.pipeline.memoryThreshold | quote }}
  PIPELINE_ERROR_RATE_THRESHOLD: {{ .Values.octantis.pipeline.errorRateThreshold | quote }}
  PIPELINE_COOLDOWN_SECONDS: {{ .Values.octantis.pipeline.cooldownSeconds | quote }}
  PIPELINE_COOLDOWN_MAX_ENTRIES: {{ .Values.octantis.pipeline.cooldownMaxEntries | quote }}
  PIPELINE_BENIGN_PATTERNS: {{ .Values.octantis.pipeline.benignPatterns | quote }}

  MIN_SEVERITY_TO_NOTIFY: {{ .Values.octantis.notifications.minSeverityToNotify | quote }}
  SLACK_CHANNEL: {{ .Values.octantis.notifications.slack.channel | quote }}
  LOG_LEVEL: {{ .Values.octantis.logLevel | quote }}
  LANGUAGE: {{ .Values.octantis.language | quote }}
