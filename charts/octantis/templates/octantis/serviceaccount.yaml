{{- if .Values.octantis.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "octantis.serviceAccountName" . }}
  labels:
    {{- include "octantis.labels" . | nindent 4 }}
    app.kubernetes.io/component: octantis
  {{- with .Values.octantis.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
