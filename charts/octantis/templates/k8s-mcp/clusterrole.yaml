{{- if and .Values.k8sMcp.enabled .Values.k8sMcp.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "octantis.fullname" . }}-k8s-mcp
  labels:
    {{- include "octantis.labels" . | nindent 4 }}
    app.kubernetes.io/component: k8s-mcp
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - events
      - configmaps
      - namespaces
      - nodes
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  {{- range .Values.k8sMcp.rbac.additionalRules }}
  - {{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
