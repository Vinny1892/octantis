{{- if and .Values.k8sMcp.enabled .Values.k8sMcp.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "octantis.fullname" . }}-k8s-mcp
  labels:
    {{- include "octantis.labels" . | nindent 4 }}
    app.kubernetes.io/component: k8s-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "octantis.fullname" . }}-k8s-mcp
subjects:
  - kind: ServiceAccount
    name: {{ include "octantis.k8sMcp.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
