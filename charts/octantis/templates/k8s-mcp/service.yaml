{{- if .Values.k8sMcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "octantis.fullname" . }}-k8s-mcp
  labels:
    {{- include "octantis.labels" . | nindent 4 }}
    app.kubernetes.io/component: k8s-mcp
spec:
  type: ClusterIP
  selector:
    {{- include "octantis.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: k8s-mcp
  ports:
    - name: sse
      port: {{ .Values.k8sMcp.port }}
      targetPort: sse
      protocol: TCP
{{- end }}
