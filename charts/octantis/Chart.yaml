apiVersion: v2
name: octantis
description: AI-powered infrastructure monitoring agent for EKS/Kubernetes
type: application
version: 0.1.0
appVersion: "latest"
home: https://github.com/vinny1892/octantis
sources:
  - https://github.com/vinny1892/octantis
maintainers:
  - name: Vinicius Espindola
annotations:
  artifacthub.io/license: AGPL-3.0-or-later
  artifacthub.io/repositoryID: b7e33f3c-edda-47ce-8e51-b724315ab3ef
  artifacthub.io/changes: |
    - kind: added
      description: Initial chart release with modular deployment support

dependencies:
  - name: opentelemetry-collector
    version: "~0.112.0"
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: otelCollector.enabled
    alias: otelCollector

  - name: opentelemetry-operator
    version: "~0.109.0"
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: otelOperator.enabled
    alias: otelOperator

  - name: kube-prometheus-stack
    version: "83.4.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: kubePrometheusStack.enabled
    alias: kubePrometheusStack

  - name: redpanda
    version: "~5.9.0"
    repository: https://charts.redpanda.com/
    condition: redpanda.enabled
    alias: redpanda
