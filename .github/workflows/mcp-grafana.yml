name: Build mcp-grafana

on:
  workflow_dispatch:
  schedule:
    # Rebuild weekly to pick up upstream updates
    - cron: "0 6 * * 1"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mcp-grafana
  UPSTREAM_REPO: https://github.com/grafana/mcp-grafana.git

jobs:
  build:
    name: Build & Push mcp-grafana
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream repo
        run: git clone --depth 1 "${{ env.UPSTREAM_REPO }}" mcp-grafana

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get upstream commit SHA
        id: upstream
        run: echo "sha=$(git -C mcp-grafana rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.upstream.outputs.sha }}

      - uses: docker/build-push-action@v7
        with:
          context: ./mcp-grafana
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
