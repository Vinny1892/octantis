name: Publish Helm Chart

on:
  push:
    tags:
      - 'chart-v*'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Package & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint charts/octantis/

      - name: Test all toggle combinations
        run: |
          for otel in true false; do
            for operator in true false; do
              for grafana in true false; do
                for k8s in true false; do
                  for kps in true false; do
                    echo "Testing: otel=$otel operator=$operator grafana=$grafana k8s=$k8s kps=$kps"
                    helm template octantis charts/octantis/ \
                      --set otelCollector.enabled=$otel \
                      --set otelOperator.enabled=$operator \
                      --set grafanaMcp.enabled=$grafana \
                      --set k8sMcp.enabled=$k8s \
                      --set kubePrometheusStack.enabled=$kps > /dev/null
                  done
                done
              done
            done
          done

      - name: Package chart
        run: helm package charts/octantis/ -d .cr-release-packages/

      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push to ghcr.io
        run: helm push .cr-release-packages/octantis-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: .cr-release-packages/octantis-*.tgz
