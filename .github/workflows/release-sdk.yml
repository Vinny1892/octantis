name: Release SDK to PyPI

on:
  push:
    tags:
      - 'sdk-v*'   # e.g. sdk-v0.1.0

permissions:
  contents: write
  id-token: write   # required for PyPI trusted publishing (OIDC)

jobs:
  release:
    name: Build & Publish SDK
    runs-on: ubuntu-latest
    environment: pypi   # configure at Settings → Environments → pypi

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history required by git-cliff

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Run tests (SDK + core)
        run: uv run pytest --tb=short -q --cov=octantis --cov-fail-under=94

      - name: Check release notes exist
        run: |
          if [ ! -f RELEASE_NOTES.md ]; then
            echo "ERROR: RELEASE_NOTES.md not found. Create it before tagging."
            exit 1
          fi

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(changelog): update for ${{ github.ref_name }}" || true
          git push

      - name: Build SDK wheel + sdist
        working-directory: packages/octantis-plugin-sdk
        run: uv build

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/octantis-plugin-sdk/dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          files: packages/octantis-plugin-sdk/dist/*
