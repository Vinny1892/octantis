name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - run: uv sync --frozen
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - run: uv sync --frozen
      - run: uv run pytest --tb=short -q --cov=octantis --cov-fail-under=94

  helm:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: Helm lint
        run: helm lint charts/octantis/

      - name: Test all toggle combinations
        run: |
          for otel in true false; do
            for operator in true false; do
              for grafana in true false; do
                for k8s in true false; do
                  for kps in true false; do
                    echo "Testing: otel=$otel operator=$operator grafana=$grafana k8s=$k8s kps=$kps"
                    helm template octantis charts/octantis/ \
                      --set otelCollector.enabled=$otel \
                      --set otelOperator.enabled=$operator \
                      --set grafanaMcp.enabled=$grafana \
                      --set k8sMcp.enabled=$k8s \
                      --set kubePrometheusStack.enabled=$kps > /dev/null
                  done
                done
              done
            done
          done

  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
