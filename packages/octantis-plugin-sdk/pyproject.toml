[project]
name = "octantis-plugin-sdk"
version = "0.1.0"
description = "Plugin SDK for Octantis — Protocols and shared types for building Octantis plugins"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [
    { name = "Vinicius Espindola" },
]
keywords = ["octantis", "plugin", "sdk", "observability", "otel"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.9.0",
]

[project.urls]
Homepage = "https://github.com/octantis/octantis"
Repository = "https://github.com/octantis/octantis"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/octantis_plugin_sdk"]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501", "UP042"]

[tool.pytest.ini_options]
testpaths = ["tests"]
