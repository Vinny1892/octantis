# Octantis — AWS Monitoring Stack (local simulation)
#
# Simulates an AWS environment for local development and testing.
# The OTel Collector adds cloud.provider=aws resource attributes so Octantis
# auto-detects the AWS platform.
#
# For real AWS deployment, see cloudformation.yaml or the ECS task definition.
#
# Usage:
#   export ANTHROPIC_API_KEY="sk-ant-..."
#   docker compose up -d
#
# Ports:
#   - 3000: Grafana UI (admin/admin)
#   - 4317: Octantis OTLP gRPC
#   - 4318: Octantis OTLP HTTP
#   - 9090: Prometheus UI
#   - 9091: Octantis Prometheus metrics

services:
  # ── Octantis ────────────────────────────────────────────────────────────────
  octantis:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9091:9090"
    environment:
      # OTLP Receiver
      OTLP_GRPC_PORT: "4317"
      OTLP_HTTP_PORT: "4318"

      # LLM — use Bedrock for real AWS deployments
      LLM_PROVIDER: "anthropic"
      LLM_MODEL: "claude-sonnet-4-6"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      # For Bedrock:
      # LLM_PROVIDER: "bedrock"
      # LLM_MODEL: "global.anthropic.claude-opus-4-6-v1"
      # AWS_REGION_NAME: "us-east-1"

      # Grafana MCP (observability slot)
      GRAFANA_MCP_URL: "http://mcp-grafana:8080/sse"
      GRAFANA_MCP_API_KEY: "dev-token"

      # AWS MCP (platform slot)
      AWS_MCP_URL: "http://mcp-aws:8080/sse"

      # Platform detection (auto-detected from cloud.provider=aws,
      # but can be forced explicitly)
      # OCTANTIS_PLATFORM: "aws"

      # Investigation
      INVESTIGATION_MAX_QUERIES: "10"
      INVESTIGATION_TIMEOUT_SECONDS: "60"

      # Pipeline
      PIPELINE_CPU_THRESHOLD: "75.0"
      PIPELINE_MEMORY_THRESHOLD: "80.0"
      PIPELINE_COOLDOWN_SECONDS: "300"

      # Notifications (optional)
      # SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/..."
      # DISCORD_WEBHOOK_URL: "https://discord.com/api/webhooks/..."

      MIN_SEVERITY_TO_NOTIFY: "MODERATE"
      LOG_LEVEL: "INFO"
    depends_on:
      - mcp-grafana
      - mcp-aws
    restart: unless-stopped

  # ── Grafana MCP Server (observability slot) ─────��───────────────────────────
  mcp-grafana:
    image: ghcr.io/grafana/mcp-grafana:latest
    environment:
      GRAFANA_URL: "http://grafana:3000"
      GRAFANA_API_KEY: "dev-token"
    depends_on:
      - grafana
    restart: unless-stopped

  # ── AWS MCP Server (platform slot) ──────────────────────────────────────────
  # Provides EC2, CloudWatch, and ECS queries to the LLM investigator.
  # Uses AWS credentials from environment or instance profile.
  #
  # In real AWS deployments, use an IAM role with least-privilege read-only
  # permissions. See SECURITY.md for the recommended IAM policy.
  mcp-aws:
    image: ghcr.io/aws/aws-mcp-server:latest
    environment:
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      # In ECS/EC2: use IAM role instead of static credentials
    restart: unless-stopped

  # ── OTel Collector ──────────────────────────────────────────────────────────
  # Collects host metrics and adds cloud.provider=aws resource attributes
  # so Octantis auto-detects the AWS platform.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - octantis
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SERVICE_ACCOUNTS_API_KEY: "dev-token"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped

  # ── Loki ────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.5.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

volumes:
  grafana-data:
  prometheus-data:
