global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Octantis internal metrics
  - job_name: "octantis"
    static_configs:
      - targets: ["octantis:9090"]
    scrape_interval: 10s
