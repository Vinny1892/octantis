# Kubernetes MCP Server (Optional, Recommended)
#
# Provides Kubernetes resource queries to enrich Octantis investigations.
# Requires RBAC permissions to read cluster resources.
#
# Prerequisites:
#   1. Octantis deployed (see octantis.yaml)
#   2. Enable K8S_MCP_URL in octantis ConfigMap:
#      K8S_MCP_URL: "http://mcp-k8s.monitoring.svc.cluster.local:8080/sse"
#
# Deploy:
#   kubectl apply -f mcp-k8s.yaml

apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-k8s
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mcp-k8s
    app.kubernetes.io/part-of: octantis

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-k8s-reader
  labels:
    app.kubernetes.io/name: mcp-k8s
    app.kubernetes.io/part-of: octantis
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - events
      - configmaps
      - namespaces
      - nodes
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-k8s-reader
  labels:
    app.kubernetes.io/name: mcp-k8s
    app.kubernetes.io/part-of: octantis
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-k8s-reader
subjects:
  - kind: ServiceAccount
    name: mcp-k8s
    namespace: monitoring

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-k8s
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mcp-k8s
    app.kubernetes.io/part-of: octantis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-k8s
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-k8s
    spec:
      serviceAccountName: mcp-k8s
      containers:
        - name: mcp-k8s
          image: ghcr.io/strowk/mcp-k8s:latest  # Replace with your preferred K8s MCP image
          ports:
            - name: sse
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: sse
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: sse
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-k8s
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mcp-k8s
    app.kubernetes.io/part-of: octantis
spec:
  selector:
    app.kubernetes.io/name: mcp-k8s
  ports:
    - name: sse
      port: 8080
      targetPort: sse
      protocol: TCP
